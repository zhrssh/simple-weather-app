---
name: CI workflow

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    container: python:3.12-slim
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install uv
          uv sync --group dev

      - name: Lint with flake8
        run: |
          uv run flake8 flaskr --count --select=E9,F63,F7,F82 --show-source --statistics
          uv run flake8 flaskr --count --max-complexity=10 --max-line-length=127 --statistics
