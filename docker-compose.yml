---
services:
  traefik:
    image: "traefik:v3.7.0-rc.2"
    container_name: "traefik"
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"

  server:
    build: .
    image: "weather-app:latest"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.server.rule=Host(`gamma.localhost`)"
      - "traefik.http.routers.server.entrypoints=web"
      - "traefik.http.middlewares.server.ratelimit.average=100"
      - "traefik.http.middlewares.server.ratelimit.burst=50"
    command:
      - "gunicorn"
      - "-c"
      - "./gunicorn.conf.py"
      - "flaskr:create_app()"
    ports:
      - "5000"
    environment:
      - SERVER_SECRET_KEY_FILE=/run/secrets/server_secret
      - WEATHER_API_KEY_FILE=/run/secrets/api_key
    secrets:
      - server_secret
      - api_key
    deploy:
      replicas: 2
      endpoint_mode: vip
      resources:
        limits:
          cpus: "0.40"
          memory: 200M
        reservations:
          cpus: "0.20"
          memory: 100M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

secrets:
  server_secret:
    file: ./secrets/server_secret.txt
  api_key:
    file: ./secrets/api_key.txt
